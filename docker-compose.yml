version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qona-postgres
    environment:
      POSTGRES_USER: qona
      POSTGRES_PASSWORD: qona_dev
      POSTGRES_DB: qona_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qona -d qona_dev']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
